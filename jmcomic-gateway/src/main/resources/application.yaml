spring:
  application:
    name: jmcomic-gateway
  cloud:
    loadbalancer:
      cache:
        enabled: true
        ttl: 30s
        capacity: 256
        health-check:
          path: /actuator/health
          initial-delay: 0s
      retry:
        enabled: true
      configurations: default
      enabled: true
reactor:
  netty:
    http:
      client:
        pool:
          acquire-timeout: 10s           # 获取连接超时10秒
          max-idle-time: 30s             # 空闲30秒关闭
          max-life-time: 60s             # 最大存活60秒
          evict-in-background: 30s
        # 增加事件循环线程数
        threads: 16
        connect-timeout: 5000            # 连接超时5秒
        response-timeout: 30000          # 响应超时30秒
      cache:
        enabled: true
        ttl: 30s
        capacity: 256
      enabled: true      
server:
  port: 7813
eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: localhost
  client:
    service-url:
      defaultZone: http://localhost:7891/eureka/
    registry-fetch-interval-seconds: 30
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    register-with-eureka: true
    fetch-registry: true
logging:
  level:
    root: WARN
    reactor: WARN
    org.springframework: WARN
    com.lazy.jmcomic: INFO
